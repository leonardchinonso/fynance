name: Docker publish

on:
  push:
    branches: [master]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          latest=$(git tag --list 'v0.*' --sort=-version:refname | head -n1)
          if [ -z "$latest" ]; then
            next="v0.1"
          else
            minor=${latest#v0.}
            next="v0.$((minor + 1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fynance:latest
            ghcr.io/${{ github.repository_owner }}/fynance:${{ steps.version.outputs.tag }}

      - name: Create git tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
