name: Docker publish

on:
  push:
    branches: [master]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fynance:latest

      - name: Tag and push version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          max_retries=5
          attempt=0
          while [ $attempt -lt $max_retries ]; do
            git fetch --tags
            latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
            if [ -z "$latest" ]; then
              next="v0.1.0"
            else
              major=$(echo $latest | cut -d. -f1 | tr -d 'v')
              minor=$(echo $latest | cut -d. -f2)
              next="v${major}.$((minor + 1)).0"
            fi
            echo "Attempt $((attempt + 1)): tagging $next"
            if git tag "$next" && git push origin "$next"; then
              echo "Tagged $next successfully"
              break
            fi
            git tag -d "$next" 2>/dev/null || true
            attempt=$((attempt + 1))
            if [ $attempt -eq $max_retries ]; then
              echo "Failed to push tag after $max_retries attempts"
              exit 1
            fi
            sleep $((RANDOM % 5 + 1))
          done
